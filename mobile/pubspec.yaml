name: spatialverify
description: Geospatial survey, verification, and HLB mapping platform.
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.0
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  encrypt: ^5.0.3
  uuid: ^4.5.1
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.1
  mapbox_maps_flutter: ^2.4.0
  image: ^4.3.0
  vector_math: ^2.1.4
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  intl: ^0.19.0
  flutter_svg: ^2.0.16
  shimmer: ^3.0.0
  web_socket_channel: ^3.0.1
  cached_network_image: ^3.4.1
  flutter_local_notifications: ^18.0.1
  sensors_plus: ^6.1.1
  battery_plus: ^6.2.1
  package_info_plus: ^8.1.2
  device_info_plus: ^11.2.0
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  google_maps_flutter: ^2.10.0
  google_mlkit_text_recognition: ^0.14.0
  open_filex: ^4.7.0
  pdf: ^3.11.1
  printing: ^5.13.4
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.7
  firebase_storage: ^12.4.5
  pdfx: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  build_runner: ^2.4.13
  drift_dev: ^2.22.1
  riverpod_generator: ^2.6.3
  json_serializable: ^6.9.0
  freezed: ^2.5.7

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: assets/images/app_icon.png
  min_sdk_android: 21
