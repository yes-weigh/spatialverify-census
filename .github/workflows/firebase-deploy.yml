name: Firebase Deploy

on:
  push:
    branches: [main]
    paths:
      - "firebase/**"
      - "public/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-deploy.yml"
  workflow_dispatch:

concurrency:
  group: firebase-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@15.1.0

      - name: Deploy Firestore rules & indexes
        run: firebase deploy --only firestore --project spatialverify-census --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Storage rules
        run: firebase deploy --only storage --project spatialverify-census --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Hosting
        run: firebase deploy --only hosting --project spatialverify-census --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
