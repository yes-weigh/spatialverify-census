name: SpatialVerify CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://spatialverify:test@localhost:5432/spatialverify_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-key-for-ci-pipeline-only
      JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci-only
      NODE_ENV: test
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: spatialverify
          POSTGRES_PASSWORD: test
          POSTGRES_DB: spatialverify_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spatialverify -d spatialverify_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run migrations
        run: npm run migrate

      - name: Test
        run: npm test

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        run: flutter test

      - name: Build APK
        run: flutter build apk --debug
