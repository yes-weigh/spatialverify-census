name: SpatialVerify CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        run: flutter test

      - name: Build APK
        run: flutter build apk --debug

  publish-android-release:
    name: Publish OTA release APK
    needs: mobile
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Bump pubspec build number
        id: version
        run: |
          read -r VERSION_NAME BUILD_NUMBER < <(python3 ../scripts/bump_pubspec_build.py pubspec.yaml)
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Bumped to ${VERSION_NAME}+${BUILD_NUMBER}"

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release APK
        run: flutter build apk --release

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@15.1.0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Publish to Firebase (OTA)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          RELEASE_NOTES: ${{ github.event.head_commit.message || 'Manual workflow run' }}
          PUBSPEC_PATH: pubspec.yaml
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
        run: |
          if [ -z "${FIREBASE_SERVICE_ACCOUNT}" ] && [ -z "${FIREBASE_TOKEN}" ] && [ -z "${GOOGLE_APPLICATION_CREDENTIALS:-}" ]; then
            echo "::warning::No FIREBASE_SERVICE_ACCOUNT or FIREBASE_TOKEN — APK built but not published."
            exit 0
          fi
          bash ../scripts/publish_android_release.sh build/app/outputs/flutter-apk/app-release.apk

      - name: Commit bumped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          if git diff --staged --quiet; then
            echo "No pubspec changes to commit"
            exit 0
          fi
          git commit -m "chore(release): bump build to ${{ steps.version.outputs.build_number }} [skip ci]"
          git push
